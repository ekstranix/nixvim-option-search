name: "parse and deploy"
on:
  schedule:
    - cron:  '05 4 * * *'
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    name: parse options and create search
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update theme to latest
        run: git submodule update --remote themes/extranix-options-search

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: extract-options-main (unstable)
        run: ./scripts/build_and_parse_nixvim_options.rb

      - name: update gitignore
        run: echo result > .gitignore

      - name: extract-options-nixos-25.11 (stable)
        env:
          NIXVIM_RELEASE: nixos-25.11
        run: ./scripts/build_and_parse_nixvim_options.rb

      - name: extract-options-nixos-25.05 (old-stable)
        env:
          NIXVIM_RELEASE: nixos-25.05
        run: ./scripts/build_and_parse_nixvim_options.rb

      - name: Build Hugo
        run: nix run nixpkgs#hugo -- --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pages-${{ github.ref_name }}
          publish_dir: ./public
